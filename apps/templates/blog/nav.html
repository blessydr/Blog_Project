{% block content %}
<style>
    /* Basic Reset */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* Navbar Styles */
    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #181818; /* Dark background */
        padding: 20px 30px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5); /* Strong shadow */
    }

    .navbar-title {
        font-size: 2.8em;
        font-weight: 700;
        color: #fff; /* White text */
        letter-spacing: 1px;
    }

    .navbar .links {
        display: flex;
        gap: 20px;
    }

    .navbar .links a {
        text-decoration: none;
        color: #fff;
        font-size: 1.1em;
        font-weight: 500;
        position: relative;
        padding: 8px 15px;
        border-radius: 5px;
        transition: color 0.3s, background-color 0.3s, transform 0.3s;
    }

    .navbar .links a:hover {
        color: #e74c3c; /* Neon Red on hover */
        background-color: #333; /* Darker background on hover */
        transform: translateY(-3px); /* Slight lift effect */
    }

    .login-button,
    .create-blog-button {
        background-color: #1e1e1e; /* Dark grey */
        color: #fff;
        padding: 12px 25px;
        border: 2px solid #e74c3c; /* Neon Red border */
        border-radius: 30px;
        cursor: pointer;
        font-size: 1.1em;
        transition: background-color 0.3s, border-color 0.3s, transform 0.3s;
    }

    .login-button i,
    .create-blog-button i {
        margin-right: 8px;
    }

    .login-button:hover,
    .create-blog-button:hover {
        background-color: #e74c3c; /* Neon Red background on hover */
        border-color: #fff; /* White border on hover */
        transform: scale(1.05);
    }

    /* Centered Search Form Styles */
    .search-form {
        display: flex;
        justify-content: center; /* Center items horizontally */
        align-items: center;
        text-align: center;
        margin: 20px auto; /* Center the search form on the page */
        gap: 20px; /* Space between items */
        max-width: 800px; /* Control width of the search form */
    }

    .search-input {
        padding: 12px;
        border: 2px solid #444; /* Dark border */
        border-radius: 30px;
        font-size: 1.1em;
        background-color: #2c3e50; /* Dark blue-grey background */
        color: #ecf0f1; /* Light text */
        transition: border 0.3s, box-shadow 0.3s, transform 0.3s;
        width: 100%; /* Full width */
        max-width: 300px; /* Set max width */
    }

    .search-input:focus {
        outline: none;
        border-color: #e74c3c; /* Neon Red border on focus */
        box-shadow: 0 0 10px rgba(231, 76, 60, 0.5); /* Neon Red glow */
        transform: translateX(5px); /* Slight move effect on focus */
    }

    .search-button {
        background-color: #1e1e1e; /* Dark background */
        color: #fff;
        padding: 12px 25px;
        border: 2px solid #e74c3c; /* Neon Red border */
        font-size: 1.1em;
        border-radius: 30px;
        cursor: pointer;
        transition: background-color 0.3s, border-color 0.3s, transform 0.3s;
    }

    .search-button:hover {
        background-color: #e74c3c; /* Neon Red background on hover */
        border-color: #fff; /* White border on hover */
        transform: scale(1.05);
    }

    .blog-count {
        color: #fff;
        font-size: 1.1em;
    }

    /* Mobile Responsiveness */
    @media (max-width: 768px) {
        .navbar {
            flex-direction: column;
            align-items: flex-start;
        }

        .navbar-title {
            font-size: 2.5em;
            margin-bottom: 15px;
        }

        .navbar .links {
            flex-direction: column;
            gap: 10px;
        }

        .search-form {
            flex-direction: column;
            gap: 10px;
            width: 100%; /* Full width on mobile */
        }

        .search-input,
        .search-button {
            width: 100%; /* Full width on mobile */
        }
    }
</style>


<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

<div class="container-fluid">
    <div class="navbar">
        <div class="navbar-title">
            BLOG
        </div>
        <div class="links">
            {% if request.user.is_authenticated %}
                <a href="{% url 'profile' %}"><i class="fa fa-user"></i> Profile</a>
                <a href="{% url 'signout' %}"><i class="fa fa-sign-out-alt"></i> Logout</a>
            {% else %}
                <a href="{% url 'signin' %}"><i class="fa fa-sign-in-alt"></i> Login</a>
            {% endif %}
        </div>
    </div>
</div>

<div class="container">
    <div class="search-form">
        <form action="{% url 'home' %}" method="get" style="flex-grow: 1;">
            <input class="search-input" type="text" name="search" placeholder="Search Blog ...">
            <button class="search-button" type="submit">Search</button>
        </form>
        <p class="blog-count">
            Count: {{ count }}
        </p>
    </div>
</div>

{% endblock content %}
