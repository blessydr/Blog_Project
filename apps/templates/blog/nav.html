{% block content %}

<style>
    /* Basic Reset */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* Navbar Styles */
    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #181818; /* Dark background */
        padding: 20px 30px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5); /* Strong shadow */
    }

    .navbar-title {
        font-size: 2.8em;
        font-weight: 700;
        color: #fff; /* White text */
        letter-spacing: 1px;
    }

    .navbar .links {
        display: flex;
        gap: 20px;
    }

    .navbar .links a {
        text-decoration: none;
        color: #fff;
        font-size: 1.1em;
        font-weight: 500;
        position: relative;
        padding: 8px 15px;
        border-radius: 5px;
        transition: color 0.3s, background-color 0.3s, transform 0.3s;
    }

    .navbar .links a:hover {
        color: #e74c3c; /* Neon Red on hover */
        background-color: #333; /* Darker background on hover */
        transform: translateY(-3px); /* Slight lift effect */
    }

    .login-button,
    .create-blog-button {
        background-color: #1e1e1e; /* Dark grey */
        color: #fff;
        padding: 12px 25px;
        border: 2px solid #e74c3c; /* Neon Red border */
        border-radius: 30px;
        cursor: pointer;
        font-size: 1.1em;
        transition: background-color 0.3s, border-color 0.3s, transform 0.3s;
    }

    .login-button i,
    .create-blog-button i {
        margin-right: 8px;
    }

    .login-button:hover,
    .create-blog-button:hover {
        background-color: #e74c3c; /* Neon Red background on hover */
        border-color: #fff; /* White border on hover */
        transform: scale(1.05);
    }

    /* Search Input Styles */
    .search-form {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 20px 0;
        flex-grow: 1;
    }

    .search-input {
        padding: 12px;
        border: 2px solid #444; /* Dark border */
        border-radius: 30px;
        flex-grow: 1;
        font-size: 1.1em;
        margin-right: 10px;
        background-color: #2c3e50; /* Dark blue-grey background */
        color: #ecf0f1; /* Light text */
        transition: border 0.3s, box-shadow 0.3s, transform 0.3s;
    }

    .search-input:focus {
        outline: none;
        border-color: #e74c3c; /* Neon Red border on focus */
        box-shadow: 0 0 10px rgba(231, 76, 60, 0.5); /* Neon Red glow */
        transform: translateX(5px); /* Slight move effect on focus */
    }

    .search-button {
        background-color: #1e1e1e; /* Dark background */
        color: #fff;
        padding: 12px 25px;
        border: 2px solid #e74c3c; /* Neon Red border */
        font-size: 1.1em;
        border-radius: 30px;
        cursor: pointer;
        transition: background-color 0.3s, border-color 0.3s, transform 0.3s;
    }

    .search-button:hover {
        background-color: #e74c3c; /* Neon Red background on hover */
        border-color: #fff; /* White border on hover */
        transform: scale(1.05);
    }

    /* Mobile Responsiveness */
    @media (max-width: 768px) {
        .navbar {
            flex-direction: column;
            align-items: flex-start;
        }

        .navbar-title {
            font-size: 2.5em;
            margin-bottom: 15px;
        }

        .navbar .links {
            flex-direction: column;
            gap: 10px;
        }

        .search-form {
            flex-direction: column;
            gap: 10px;
        }
    }
</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

<div class="container-fluid">
    <div class="navbar">
        <div class="navbar-title">
            BLOG
        </div>
        <div class="links">
            {% if request.user.is_authenticated %}
                <a href="{% url 'profile' %}"><i class="fa fa-user"></i> Profile</a>
                <a href="{% url 'Signout' %}"><i class="fa fa-sign-out-alt"></i> Logout</a>
            {% else %}
                <a href="{% url 'Signin' %}"><i class="fa fa-sign-in-alt"></i> Login</a>
            {% endif %}
        </div>
    </div>
</div>

<div class="container">
    <div class="search-form">
        <a class="create-blog-button" href="{% url 'create' %}"><i class="fa fa-pencil-alt"></i> Create Blog</a>  
        <form action="{% url 'home' %}" method="get" style="flex-grow: 1;">
            <input class="search-input" type="text" name="search" placeholder="Search Blog ...">
            <button class="search-button" type="submit">Search</button>
        </form>
        <p class="blog-count">
            Count: {{ count }}
        </p>
    </div>
</div>

{% endblock content %}
