{%block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Blog</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        /* Basic reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Centering container */
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #f0f2f5;
    font-family: Arial, sans-serif;
}

.container {
    max-width: 600px;
    width: 100%;
    padding: 20px;
}

/* Form container styling */
.form-container {
    background-color: #fff;
    border-radius: 8px;
    padding: 30px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    text-align: center;
}

h2 {
    font-size: 1.8em;
    margin-bottom: 20px;
    color: #333;
}

/* Form input fields */
.form-group {
    margin-bottom: 15px;
    text-align: left;
    width: 100%;
}

label {
    font-size: 0.9em;
    color: #555;
    margin-bottom: 5px;
    display: block;
}

input[type="text"],
textarea,
input[type="file"] {
    width: 100%;
    padding: 10px;
    font-size: 1em;
    border: 1px solid #ddd;
    border-radius: 5px;
    transition: border-color 0.3s;
}

textarea {
    resize: vertical;
    height: 150px;
}

input[type="text"]:focus,
textarea:focus {
    outline: none;
    border-color: #3498db;
}

/* Tags checkbox styling */
.tags-container {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.tag-option {
    display: flex;
    align-items: center;
    gap: 5px;
}

.tag-option input {
    transform: scale(1.2);
}

.tag-option label {
    font-size: 1em;
    color: #555;
}

/* Submit button styling */
.submit-button {
    width: 100%;
    padding: 12px;
    background-color: #3498db;
    border: none;
    border-radius: 5px;
    color: #fff;
    font-size: 1.1em;
    cursor: pointer;
    transition: background-color 0.3s;
}

.submit-button:hover {
    background-color: #2980b9;
}

    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h2>Create Blog</h2>
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="form-group">
                    <label for="title">Blog Title</label>
                    <input type="text" id="title" name="title" placeholder="Enter your blog title" required>
                </div>
                <div class="form-group">
                    <label for="description">Blog Description</label>
                    <textarea id="description" name="description" placeholder="Enter your blog description" required></textarea>
                </div>
                <div class="form-group">
                    <label>Tags</label>
                    <div class="tags-container">
                        {% for tag in tags %}
                            <div class="tag-option">
                                <input type="checkbox" id="tag_{{ tag.id }}" name="tags" value="{{ tag.id }}">
                                <label for="tag_{{ tag.id }}">{{ tag.blog_tag }}</label>
                            </div>
                        {% endfor %}
                    </div>
                </div>
                <div class="form-group">
                    <label for="image">Blog Image</label>
                    <input type="file" id="image" name="image" accept="image/*">
                </div>
                <button type="submit" class="submit-button">Create Blog</button>
            </form>
        </div>
    </div>
</body>
</html>

{%endblock%}
